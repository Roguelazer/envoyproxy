name: "On Push to Main"
on:
  push:
    branches:
      - main
permissions:
  contents: write
  packages: write
  id-token: write
jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit
  deploy-to-ghcr:
    needs: [ci]
    uses: ./.github/workflows/deploy.yml
    with:
      image_repo: ghcr.io/roguelazer/envoyproxy
      staging_image_repo: ghcr.io/roguelazer/envoyproxy-staging
    secrets: inherit
